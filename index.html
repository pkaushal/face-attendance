<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaceTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="logo">FaceTrack</div>
      <div class="nav-links">
        <button class="nav-btn active" data-tab="attendance">Attendance</button>
        <button class="nav-btn admin-only" data-tab="register">Register</button>
        <button class="nav-btn admin-only" data-tab="users">Users</button>
        <button class="nav-btn" data-tab="logs">History</button>
      </div>
      <div class="user-section">
        <div id="user-info" class="hidden">
          <img id="user-avatar" src="" alt="">
          <span id="user-name"></span>
          <span id="admin-badge" class="hidden">Admin</span>
        </div>
        <div class="login-buttons">
          <button id="login-google" class="btn btn-login">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button id="login-github" class="btn btn-login">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            GitHub
          </button>
        </div>
        <button id="logout-btn" class="btn btn-ghost hidden">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <section id="attendance" class="tab-content active">
        <div class="camera-container">
          <div class="video-wrapper">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div class="status-badge" id="status-badge">Initializing...</div>
          </div>
        </div>
        <div class="attendance-sidebar">
          <div class="card">
            <h3>Recognized</h3>
            <div id="detected-user" class="detected-user">
              <span class="placeholder">Waiting for face...</span>
            </div>
          </div>
          <div class="card">
            <h3>Today's Attendance</h3>
            <div id="today-list" class="attendance-list"></div>
          </div>
        </div>
      </section>

      <section id="register" class="tab-content">
        <div class="register-grid">
          <div class="card">
            <h3>Capture Face</h3>
            <div class="video-wrapper small">
              <video id="register-video" autoplay muted playsinline></video>
              <canvas id="register-overlay"></canvas>
            </div>
            <div class="capture-actions">
              <button id="capture-btn" class="btn btn-primary" disabled>Capture</button>
              <button id="retake-btn" class="btn btn-ghost hidden">Retake</button>
            </div>
            <div id="capture-preview" class="capture-preview hidden">
              <img id="captured-image" alt="Captured">
            </div>
          </div>
          <div class="card">
            <h3>Employee Details</h3>
            <form id="register-form" class="form">
              <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="employee-id" required placeholder="EMP001">
              </div>
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="employee-name" required placeholder="John Smith">
              </div>
              <button type="submit" class="btn btn-primary btn-full">Register Employee</button>
            </form>
          </div>
        </div>
      </section>

      <section id="users" class="tab-content">
        <div class="card">
          <div class="card-header">
            <h3>Registered Users</h3>
            <span id="user-count">0</span>
          </div>
          <div id="users-grid" class="users-grid"></div>
        </div>
      </section>

      <section id="logs" class="tab-content">
        <div class="card">
          <div class="card-header">
            <h3>Attendance History</h3>
            <div class="filters">
              <input type="date" id="log-date">
              <select id="log-user">
                <option value="">All Users</option>
              </select>
              <button id="export-btn" class="btn btn-ghost">Export CSV</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Employee</th>
                  <th>Check In</th>
                  <th>Check Out</th>
                  <th>Duration</th>
                </tr>
              </thead>
              <tbody id="logs-tbody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span id="loading-text">Loading...</span>
    </div>
  </div>

  <script>
    const API_URL = 'https://att.konsoftech.in';
  </script>
  <script src="js/db.js"></script>
  <script src="js/api.js"></script>
  <script src="js/face.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
